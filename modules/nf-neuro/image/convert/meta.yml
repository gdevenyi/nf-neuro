# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: image_convert
description: |
  Small utility module to perform data type conversion on images. The new
  datatype has to be specified using the task.ext.datatype parameter, otherwise,
  the module will fail.
keywords:
  - image
  - convert
  - datatype
tools:
  - MRtrix3:
      description: |
        MRtrix3 is a software package for various types of diffusion imaging
        data, including diffusion-weighted, diffusion-tensor, and q-ball imaging.
      homepage: https://www.mrtrix.org/
      doi: 10.1016/j.neuroimage.2019.116137
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - image:
        type: file
        description: Image to convert.
        pattern: "*.nii.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989 # GZIP format
args: 
  - datatype:
      type: string
      description: Data type to convert the image to. This should be a valid data type supported by MRtrix3, such as "float32", "int16", etc. If not specified, the module will fail. 
  - single_thread:
      type: boolean
      description: If true, the command will be run in single-threaded mode. By default, the command will use multiple threads based on the number of CPUs allocated to the task.
      default: false
  - mrtrix_rng_seed:
      type: integer
      description: Random seed for MRtrix3. Setting a fixed seed can help with reproducibility of results.
      default: 1234
output:
  image:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*_converted.nii.gz":
          type: file
          description: Image converted into the specified datatype.
          pattern: "*_converted.nii.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989 # GZIP format
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: versions.yml
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@gagnonanthony"
maintainers:
  - "@gagnonanthony"
