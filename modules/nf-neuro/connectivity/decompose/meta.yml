# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: connectivity_decompose
description: Divide a tractogram into its various connections using a brain parcellation(labels).
  The hdf5 output format allows to store other information required for connectivity,
  such as the associated labels.
keywords:
  - nifti
  - connectivity
  - decompose
  - scilpy
tools:
  - scilpy:
      description: The Sherbrooke Connectivity Imaging Lab (SCIL) Python dMRI processing
        toolbox.
      homepage: https://github.com/scilus/scilpy.git
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - trk:
        type: file
        description: Tractogram to decompose.
        pattern: "*.{trk, tck, vtk, fib, dpy}"
        ontologies: []
    - labels:
        type: file
        description: brain parcellation. Labels must have 0 as background. Volumes must
          have isotropic voxels.
        pattern: "*.nii.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989 # GZIP format
args:
  - no_pruning:
      type: boolean
      description: If set, will NOT prune on length.
        Length criteria in min_len, max_len.
      default: false
  - no_remove_loops:
      type: boolean
      description: If set, will NOT remove streamlines making loops.
        Angle criteria based on max_angle
      default: false
  - no_remove_outliers:
      type: boolean
      description: If set, will NOT remove outliers using QuickBundle.
        Criteria based on --outlier_threshold.
      default: false
  - no_remove_curv:
      type: boolean
      description: If set, will NOT remove streamlines that deviate from the mean curvature.
        Threshold based on max_curv.
      default: false
  - min_len:
      type: number
      description: Pruning minimal segment length.
      default: 20.0
  - max_len:
      type: number
      description: Pruning maximal segment length.
      default: 200.0
  - outlier_threshold:
      type: number
      description: Outlier removal threshold when using hierarchical QuickBundle.
      default: 0.6
  - max_angle:
      type: number
      description: Maximal winding angle over which a streamline is considered as looping.
      default: 330
  - max_curv:
      type: number
      description: Clustering threshold for centroids curvature filtering with QuickBundle.
      default: 10
  - single_thread:
      type: boolean
      description: If true, the command will be run in single-threaded mode. By default, the command will use multiple threads based on the number of CPUs allocated to the task.
      default: false
output:
  hdf5:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*__decomposed.h5":
          type: file
          description: |
            Output hdf5 file where each bundles is a group with key'LABEL1_LABEL2'.
            The array_sequence format cannot be stored directly in a hdf5, so each
            group is composed of 'data', 'offsets' and 'lengths' from the array
            sequence. The 'data' is stored in VOX/CORNER for simplicity and efficiency.
          pattern: "*__decomposed.h5"
          ontologies: []
  labels_list:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*__labels_list.txt":
          type: file
          description: Save the labels list as text file.
          pattern: "*__labels_list.txt"
          ontologies: []
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: versions.yml
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@ThoumyreStanislas"
maintainers:
  - "@ThoumyreStanislas"
